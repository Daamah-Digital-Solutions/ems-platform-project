# Render Blueprint — يشغّل الـ backend (FastAPI) على الخطة المجانية
# الاستخدام: من Render > New > Blueprint، اختر الريبو، وهيقرأ الملف ده تلقائياً.
services:
  - type: web
    name: ems-elriyadh-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      # يتولّدوا تلقائياً (آمنين) — لا تكتبهم بنفسك
      - key: SECRET_KEY
        generateValue: true
      - key: PUBLIC_API_KEY
        generateValue: true
      # ثابتة
      - key: PUBLIC_STUDIO_ID
        value: "1"
      - key: ENV
        value: production
      - key: ZATCA_SANDBOX
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12.6"
      # تحطها بنفسك في لوحة Render (sync:false = مش هتتزامن من الملف)
      - key: DATABASE_URL        # رابط Neon (Postgres)
        sync: false
      - key: CORS_ORIGINS        # روابط الواجهة، مثال: https://ems-crm.vercel.app,https://crm.emselriyadh.com
        sync: false
