services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ems
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ems
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ems"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ems:${POSTGRES_PASSWORD}@db:5432/ems
      SECRET_KEY: ${SECRET_KEY}
      PUBLIC_API_KEY: ${PUBLIC_API_KEY}
      PUBLIC_STUDIO_ID: "1"
      ENV: production
      ZATCA_SANDBOX: "true"
      CORS_ORIGINS: ${SITE_URL}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}
    volumes:
      - caddydata:/data
      - caddyconfig:/config

volumes:
  dbdata:
  caddydata:
  caddyconfig:
